<section class="settings-page page-animation">
  <app-card title="Configurações" subtitle="Ajuste a taxa padrão cobrada pelos aplicativos.">
    @if (loading()) {
      <app-loading text="A carregar configurações..."></app-loading>
    } @else {
      <form [formGroup]="form" (ngSubmit)="guardar()" class="form-grid">
        <div class="form-field">
          <label for="defaultAppFeePercentage">Taxa padrão de apps (%)</label>
          <input
            id="defaultAppFeePercentage"
            type="number"
            inputmode="decimal"
            min="0"
            max="100"
            step="0.01"
            formControlName="defaultAppFeePercentage"
          />
          <app-field-errors
            [control]="form.controls.defaultAppFeePercentage"
            [backendError]="backendFieldErrors()['defaultAppFeePercentage']"
          ></app-field-errors>
        </div>

        @if (generalError()) {
          <app-alert type="erro" [text]="generalError() || ''"></app-alert>
        }

        <button type="submit" class="btn primary full" [disabled]="saving()">
          {{ saving() ? 'A guardar...' : 'Guardar' }}
        </button>
      </form>
    }
  </app-card>
</section>

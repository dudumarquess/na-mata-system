<div class="toast-stack" aria-live="polite" aria-atomic="true">
  @for (toast of toastService.messages(); track toast.id) {
    <article class="toast" [class.sucesso]="toast.type === 'sucesso'" [class.erro]="toast.type === 'erro'" [class.info]="toast.type === 'info'">
      <p>{{ toast.text }}</p>
      <button type="button" (click)="toastService.remove(toast.id)" aria-label="Fechar mensagem">✕</button>
    </article>
  }
</div>
